<!DOCTYPE html>
<html lang="zh-CN" class="no-js">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OpenHex Agent Access</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/login.css">
</head>
<body class="loading">
<main>
<section class="content content--spacing">
				<div class="grid grid--4">
					<div class="grid-wrap">
						<div class="grid__item"><div class="grid__item-inner" style="background-image:url(img/1.jpg)"></div></div>
						<div class="grid__item"><div class="grid__item-inner" style="background-image:url(img/2.jpg)"></div></div>
						<div class="grid__item"><div class="grid__item-inner" style="background-image:url(img/3.jpg)"></div></div>
						<div class="grid__item"><div class="grid__item-inner" style="background-image:url(img/4.jpg)"></div></div>
						<div class="grid__item"><div class="grid__item-inner" style="background-image:url(img/5.jpg)"></div></div>
						<div class="grid__item"><div class="grid__item-inner" style="background-image:url(img/6.jpg)"></div></div>
						<div class="grid__item"><div class="grid__item-inner" style="background-image:url(img/7.jpg)"></div></div>
						<div class="grid__item"><div class="grid__item-inner" style="background-image:url(img/8.jpg)"></div></div>
						<div class="grid__item"><div class="grid__item-inner" style="background-image:url(img/9.jpg)"></div></div>
					</div>
				</div>
				
			</section>
</main>
<aside class="login-panel" aria-labelledby="login-title">
	<img class="login-panel__brand" src="img/openhex-logo.svg" alt="OpenHex">

	<div class="login-panel__content">
		<div class="login-panel__heading">
			<h1 id="login-title">欢迎回来</h1>
			<p>手机号快捷登录 · 安全认证</p>
		</div>

		<form class="login-form" novalidate>
			<label class="phone-field" for="login-phone">
				<span class="phone-field__label">手机号码</span>
				<span class="phone-field__code">+86</span>
				<span class="phone-field__divider" aria-hidden="true"></span>
				<input
					id="login-phone"
					name="phone"
					type="tel"
					inputmode="numeric"
					autocomplete="tel-national"
					maxlength="11"
					placeholder="请输入手机号码"
					aria-describedby="phone-message"
				>
			</label>

			<p id="phone-message" class="login-form__message" aria-live="polite"></p>

			<div class="verification-area" aria-hidden="true">
				<label class="verification-field" for="login-code">
					<span class="verification-field__label">验证码</span>
					<input
						id="login-code"
						name="verification-code"
						type="text"
						inputmode="numeric"
						autocomplete="one-time-code"
						maxlength="6"
						placeholder="请输入 6 位验证码"
						aria-describedby="code-message"
						disabled
					>
					<button class="verification-field__resend" type="button" disabled>60 秒</button>
				</label>

				<p id="code-message" class="login-form__code-message" aria-live="polite"></p>
			</div>

			<button class="login-form__submit" type="submit">
				<span class="login-form__submit-text">获取验证码</span>
				<span class="login-form__arrow" aria-hidden="true">→</span>
			</button>

			<p class="login-form__agreement">
				登入即代表同意
				<a href="#">用户协议</a>、
				<a href="#">隐私政策</a>
				与
				<a href="#">免责声明</a>
			</p>
		</form>
	</div>
</aside>
<script src="js/gsap.min.js"></script>
<script src="js/imagesloaded.pkgd.min.js"></script>
<script type="module" src="js/index.js"></script>
<script src="js/login.js"></script>
</body>
</html>
